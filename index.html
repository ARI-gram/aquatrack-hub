<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Identity -->
    <title>AquaTrack | Water Distribution Management</title>
    <meta
      name="description"
      content="AquaTrack is a SaaS platform for managing water distribution, tracking deliveries, and streamlining operations."
    />
    <meta name="author" content="AquaTrack" />

    <!-- ── PWA ── -->
    <!-- manifest href is swapped dynamically in main.tsx based on /customer/ path -->
    <link rel="manifest" href="/manifest-staff.json" />
    <meta name="theme-color" content="#0f3460" />

    <!-- iOS PWA — both tags required (apple one kept for older iOS, standard one for modern browsers) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AquaTrack Staff" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph / Social Preview -->
    <meta property="og:title" content="AquaTrack" />
    <meta
      property="og:description"
      content="Streamline your water distribution operations with AquaTrack."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
